<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0B0E14">
<meta name="description" content="NEXDESK — Technical support & ticketing operations console for NEXARCH Systems Engineering.">
<title>NEXDESK · Support Operations Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230B0E14'/><path d='M30 70V30h8l24 26V30h8v40h-8L38 44v26z' fill='%232DE2C0'/></svg>">
<style>
/* ============================================================
   NEXDESK — Operations Console
   Design tokens: phosphor-teal signature on deep slate,
   signal colors reserved strictly for ticket state.
============================================================ */
:root{
  --void:#0B0E14; --panel:#131822; --panel-2:#1A2130; --panel-3:#222B3B;
  --line:#232C3B; --line-2:#2E394C;
  --ink:#E6ECF5; --muted:#8B97AB; --faint:#5C6678;
  --teal:#2DE2C0; --teal-dim:#1c8f7d; --teal-glow:rgba(45,226,192,.18);
  --crit:#FF4D5E; --high:#FF9F40; --med:#FFD23F; --low:#3DB9F5; --ok:#36D399;
  --crit-bg:rgba(255,77,94,.12); --high-bg:rgba(255,159,64,.12);
  --med-bg:rgba(255,210,63,.12); --low-bg:rgba(61,185,245,.12); --ok-bg:rgba(54,211,153,.12);
  --r:14px; --r-sm:9px; --r-lg:20px;
  --sb:248px;
  --f-disp:'Chakra Petch',sans-serif; --f-body:'Inter',sans-serif; --f-mono:'JetBrains Mono',monospace;
  --sh:0 1px 0 rgba(255,255,255,.02) inset, 0 16px 40px rgba(0,0,0,.4);
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  font-family:var(--f-body);background:var(--void);color:var(--ink);
  font-size:14px;line-height:1.5;overflow-x:hidden;-webkit-font-smoothing:antialiased;
  background-image:
    radial-gradient(900px 500px at 100% -10%, rgba(45,226,192,.06), transparent 60%),
    radial-gradient(700px 500px at -10% 110%, rgba(91,140,255,.05), transparent 60%);
  background-attachment:fixed;
}
::selection{background:var(--teal-glow);color:#fff}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:20px;border:2px solid var(--void)}
::-webkit-scrollbar-track{background:transparent}

/* ---------- App shell ---------- */
#app{display:grid;grid-template-columns:var(--sb) 1fr;min-height:100vh}

/* ---------- Sidebar ---------- */
.sidebar{
  position:fixed;inset:0 auto 0 0;width:var(--sb);background:var(--panel);
  border-right:1px solid var(--line);display:flex;flex-direction:column;z-index:50;
}
.brand{display:flex;align-items:center;gap:11px;padding:20px 18px 18px;border-bottom:1px solid var(--line)}
.brand .logo{width:38px;height:38px;border-radius:11px;background:linear-gradient(150deg,#16201d,#0f1318);
  border:1px solid var(--line-2);display:grid;place-items:center;flex:none;box-shadow:0 0 22px var(--teal-glow)}
.brand .logo svg{width:22px;height:22px}
.brand h1{font-family:var(--f-disp);font-size:18px;font-weight:700;letter-spacing:.5px;line-height:1}
.brand .sub{font-family:var(--f-mono);font-size:9.5px;color:var(--teal);letter-spacing:2px;text-transform:uppercase;margin-top:3px}
.nav{flex:1;padding:14px 12px;overflow-y:auto}
.nav-label{font-family:var(--f-mono);font-size:9.5px;letter-spacing:2px;color:var(--faint);
  text-transform:uppercase;padding:14px 12px 7px}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--r-sm);
  color:var(--muted);font-weight:500;font-size:13.5px;position:relative;transition:.16s;margin-bottom:2px}
.nav-item:hover{background:var(--panel-2);color:var(--ink)}
.nav-item.active{background:linear-gradient(90deg,var(--teal-glow),transparent);color:var(--ink)}
.nav-item.active::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:3px;
  background:var(--teal);border-radius:0 3px 3px 0;box-shadow:0 0 12px var(--teal)}
.nav-item svg{width:18px;height:18px;flex:none;stroke-width:1.9}
.nav-item .badge{margin-left:auto;font-family:var(--f-mono);font-size:10.5px;background:var(--panel-3);
  color:var(--muted);padding:2px 7px;border-radius:20px;min-width:22px;text-align:center}
.nav-item.active .badge{background:var(--teal);color:#04130f;font-weight:700}
.sb-foot{padding:12px;border-top:1px solid var(--line)}
.user-card{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r-sm);background:var(--panel-2)}
.avatar{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--teal-dim),#3a567f);
  display:grid;place-items:center;font-family:var(--f-disp);font-weight:700;font-size:13px;color:#04130f;flex:none}
.user-card .nm{font-size:12.5px;font-weight:600;line-height:1.2}
.user-card .rl{font-size:10.5px;color:var(--muted)}

/* ---------- Main column ---------- */
.main{grid-column:2;display:flex;flex-direction:column;min-width:0}
.topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:14px;
  padding:13px 26px;background:rgba(11,14,20,.78);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line)}
.menu-btn{display:none;width:38px;height:38px;border-radius:10px;border:1px solid var(--line);
  background:var(--panel);place-items:center}
.menu-btn svg{width:20px;height:20px}
.search{flex:1;max-width:440px;position:relative}
.search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--faint)}
.search input{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:11px;
  padding:10px 14px 10px 38px;color:var(--ink);outline:none;transition:.16s}
.search input:focus{border-color:var(--teal-dim);box-shadow:0 0 0 3px var(--teal-glow)}
.search input::placeholder{color:var(--faint)}
.top-spacer{flex:1}
.conn{display:flex;align-items:center;gap:7px;font-family:var(--f-mono);font-size:11px;color:var(--muted);
  padding:7px 12px;border:1px solid var(--line);border-radius:20px;background:var(--panel)}
.conn .dot{width:8px;height:8px;border-radius:50%;background:var(--ok);box-shadow:0 0 8px var(--ok)}
.conn.offline .dot{background:var(--high);box-shadow:0 0 8px var(--high)}
.conn.syncing .dot{background:var(--low);animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.35}}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:11px;
  font-weight:600;font-size:13.5px;transition:.16s;white-space:nowrap}
.btn svg{width:17px;height:17px;stroke-width:2.1}
.btn-primary{background:var(--teal);color:#04130f;box-shadow:0 6px 18px var(--teal-glow)}
.btn-primary:hover{filter:brightness(1.08);transform:translateY(-1px)}
.btn-ghost{background:var(--panel);border:1px solid var(--line);color:var(--ink)}
.btn-ghost:hover{border-color:var(--line-2);background:var(--panel-2)}
.btn-sm{padding:7px 12px;font-size:12.5px;border-radius:9px}

/* ---------- View container ---------- */
.view{padding:26px;max-width:1320px;width:100%;margin:0 auto;animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.view-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap}
.view-head h2{font-family:var(--f-disp);font-size:26px;font-weight:700;letter-spacing:.3px;line-height:1.1}
.view-head .eyebrow{font-family:var(--f-mono);font-size:10.5px;letter-spacing:2.5px;color:var(--teal);
  text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.view-head .eyebrow::before{content:"";width:18px;height:1px;background:var(--teal)}
.view-head p{color:var(--muted);font-size:13.5px;margin-top:4px}

/* ---------- KPI strip ---------- */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:17px 18px;
  position:relative;overflow:hidden}
.kpi::after{content:"";position:absolute;right:-30px;top:-30px;width:90px;height:90px;border-radius:50%;
  background:radial-gradient(circle,var(--teal-glow),transparent 70%);opacity:.6}
.kpi .lab{font-family:var(--f-mono);font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);
  display:flex;align-items:center;gap:8px}
.kpi .lab svg{width:15px;height:15px;color:var(--teal)}
.kpi .val{font-family:var(--f-disp);font-size:32px;font-weight:700;margin-top:10px;line-height:1;letter-spacing:.5px}
.kpi .delta{font-family:var(--f-mono);font-size:11px;margin-top:8px;display:flex;align-items:center;gap:5px;color:var(--muted)}
.kpi .delta.up{color:var(--ok)} .kpi .delta.down{color:var(--crit)}
.kpi.alert .val{color:var(--crit)} .kpi.warn .val{color:var(--high)}

/* ---------- Panels / cards ---------- */
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
.panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:15px 18px;border-bottom:1px solid var(--line)}
.panel-head h3{font-family:var(--f-disp);font-size:15.5px;font-weight:600;letter-spacing:.3px;display:flex;align-items:center;gap:9px}
.panel-head h3 svg{width:17px;height:17px;color:var(--teal)}
.panel-body{padding:18px}
.grid-2{display:grid;grid-template-columns:1.6fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}

/* ---------- Status & priority chips ---------- */
.chip{display:inline-flex;align-items:center;gap:6px;font-family:var(--f-mono);font-size:10.5px;
  font-weight:600;letter-spacing:.5px;padding:4px 9px;border-radius:7px;text-transform:uppercase;white-space:nowrap}
.chip .pip{width:6px;height:6px;border-radius:50%;background:currentColor;box-shadow:0 0 7px currentColor}
.pri-critical{color:var(--crit);background:var(--crit-bg)} .pri-high{color:var(--high);background:var(--high-bg)}
.pri-medium{color:var(--med);background:var(--med-bg)} .pri-low{color:var(--low);background:var(--low-bg)}
.st-open{color:var(--low);background:var(--low-bg)} .st-progress{color:var(--high);background:var(--high-bg)}
.st-waiting{color:var(--med);background:var(--med-bg)} .st-resolved{color:var(--ok);background:var(--ok-bg)}
.st-closed{color:var(--faint);background:rgba(92,102,120,.12)}

/* ---------- Ticket table ---------- */
.tk-toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.seg{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px}
.seg button{padding:7px 13px;border-radius:7px;font-size:12.5px;font-weight:600;color:var(--muted);transition:.15s}
.seg button.on{background:var(--panel-3);color:var(--ink)}
.fld{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:9px 13px;color:var(--ink);outline:none}
.fld:focus{border-color:var(--teal-dim)}
select.fld{cursor:pointer}
.tk-list{display:flex;flex-direction:column;gap:0}
.tk-row{display:grid;grid-template-columns:84px 1fr 120px 116px 130px 96px;gap:14px;align-items:center;
  padding:14px 18px;border:1px solid var(--line);border-top:none;background:var(--panel);transition:.14s;cursor:pointer}
.tk-row:first-child{border-top:1px solid var(--line);border-radius:var(--r) var(--r) 0 0}
.tk-row:last-child{border-radius:0 0 var(--r) var(--r)}
.tk-row:hover{background:var(--panel-2);border-color:var(--line-2)}
.tk-row.compact{grid-template-columns:64px 1fr auto;gap:12px}
.tk-id{font-family:var(--f-mono);font-size:12px;color:var(--teal);font-weight:500}
.tk-subj{font-weight:600;font-size:13.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tk-meta{font-size:11.5px;color:var(--muted);margin-top:3px;display:flex;gap:9px;font-family:var(--f-mono)}
.tk-assignee{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted)}
.tk-assignee .avatar{width:26px;height:26px;font-size:11px;border-radius:7px}
.sla-bar{height:5px;border-radius:5px;background:var(--panel-3);overflow:hidden;margin-top:6px}
.sla-bar i{display:block;height:100%;border-radius:5px;transition:width .5s}
.sla-txt{font-family:var(--f-mono);font-size:10.5px;color:var(--muted)}

/* ---------- Triage console (signature) ---------- */
.triage{background:linear-gradient(165deg,#10171f,#0c1117);border:1px solid var(--line-2);
  border-radius:var(--r);overflow:hidden;position:relative}
.triage::before{content:"";position:absolute;inset:0;background:
  repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(45,226,192,.012) 3px,transparent 4px);
  pointer-events:none}
.triage-head{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--line)}
.triage-head>svg{width:16px;height:16px;flex:0 0 auto;color:var(--teal)}
.triage-head .ttl{font-family:var(--f-disp);font-size:14px;font-weight:600;letter-spacing:.5px}
.triage-head .live{margin-left:auto;font-family:var(--f-mono);font-size:9.5px;letter-spacing:1.5px;
  color:var(--teal);display:flex;align-items:center;gap:6px}
.triage-head .live .dot{width:7px;height:7px;border-radius:50%;background:var(--teal);
  box-shadow:0 0 9px var(--teal);animation:pulse 1.4s infinite}
.readout{padding:16px 18px;display:flex;flex-direction:column;gap:15px}
.gauge{}
.gauge .gl{display:flex;justify-content:space-between;font-family:var(--f-mono);font-size:10.5px;
  letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.gauge .gv{font-weight:700;color:var(--ink)}
.gauge .track{height:8px;background:#0a0e14;border:1px solid var(--line);border-radius:6px;overflow:hidden;position:relative}
.gauge .fill{height:100%;border-radius:6px;width:0;transition:width .7s cubic-bezier(.2,.8,.2,1);
  background:linear-gradient(90deg,var(--teal-dim),var(--teal));box-shadow:0 0 12px var(--teal-glow)}
.conf-row{display:flex;gap:8px;flex-wrap:wrap}
.conf-tag{font-family:var(--f-mono);font-size:11px;padding:5px 10px;border-radius:7px;
  background:var(--panel-2);border:1px solid var(--line);color:var(--muted)}
.conf-tag b{color:var(--teal)}
.sim-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--line)}
.sim-item .id{font-family:var(--f-mono);font-size:11px;color:var(--teal)}
.sim-item .mt{font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted)}
.sim-item .pct{font-family:var(--f-mono);font-size:11px;color:var(--ink);font-weight:600}

/* ---------- Forms ---------- */
.form-grid{display:grid;gap:16px}
.field label{display:block;font-family:var(--f-mono);font-size:10.5px;letter-spacing:1px;text-transform:uppercase;
  color:var(--muted);margin-bottom:7px}
.field input,.field select,.field textarea{width:100%;background:var(--panel-2);border:1px solid var(--line);
  border-radius:10px;padding:11px 13px;color:var(--ink);outline:none;transition:.15s;resize:vertical}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--teal-dim);box-shadow:0 0 0 3px var(--teal-glow);background:var(--panel)}
.field textarea{min-height:120px;line-height:1.6}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* ---------- Ticket detail ---------- */
.detail-grid{display:grid;grid-template-columns:1fr 320px;gap:18px;align-items:start}
.thread{display:flex;flex-direction:column;gap:14px}
.msg{display:flex;gap:12px}
.msg .avatar{width:36px;height:36px;font-size:13px}
.msg.agent .bubble{border-left:2px solid var(--teal)}
.bubble{flex:1;background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:13px 15px}
.bubble .bh{display:flex;align-items:center;gap:9px;margin-bottom:6px}
.bubble .bh .who{font-weight:600;font-size:13px}
.bubble .bh .when{font-family:var(--f-mono);font-size:10.5px;color:var(--faint);margin-left:auto}
.bubble .txt{font-size:13.5px;line-height:1.6;color:var(--ink)}
.meta-list{display:flex;flex-direction:column}
.meta-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);gap:12px}
.meta-row:last-child{border-bottom:none}
.meta-row .k{font-family:var(--f-mono);font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.timeline{position:relative;padding-left:22px}
.timeline::before{content:"";position:absolute;left:6px;top:4px;bottom:4px;width:2px;background:var(--line)}
.tl-item{position:relative;padding-bottom:16px}
.tl-item::before{content:"";position:absolute;left:-19px;top:3px;width:10px;height:10px;border-radius:50%;
  background:var(--panel);border:2px solid var(--teal)}
.tl-item .tt{font-size:12.5px;font-weight:500}
.tl-item .td{font-family:var(--f-mono);font-size:10.5px;color:var(--faint);margin-top:2px}

/* ---------- KB ---------- */
.kb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.kb-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px;
  transition:.16s;cursor:pointer}
.kb-card:hover{border-color:var(--teal-dim);transform:translateY(-2px);box-shadow:0 12px 30px rgba(0,0,0,.3)}
.kb-card .cat{font-family:var(--f-mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--teal)}
.kb-card h4{font-family:var(--f-disp);font-size:15.5px;font-weight:600;margin:9px 0 8px;line-height:1.3}
.kb-card p{font-size:12.5px;color:var(--muted);line-height:1.55;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.kb-card .ft{display:flex;gap:14px;margin-top:13px;font-family:var(--f-mono);font-size:10.5px;color:var(--faint)}

/* ---------- Analytics charts ---------- */
.chart-wrap{position:relative;height:240px}
.chart-wrap canvas{width:100%;height:100%}
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:12px}
.legend span{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--muted)}
.legend i{width:11px;height:11px;border-radius:3px}

/* ---------- Chatbot ---------- */
.chat-fab{position:fixed;right:24px;bottom:24px;width:58px;height:58px;border-radius:18px;z-index:60;
  background:var(--teal);color:#04130f;display:grid;place-items:center;box-shadow:0 10px 30px var(--teal-glow);transition:.18s}
.chat-fab:hover{transform:scale(1.06) translateY(-2px)}
.chat-fab svg{width:26px;height:26px}
.chat-fab .ping{position:absolute;top:-3px;right:-3px;width:18px;height:18px;border-radius:50%;
  background:var(--crit);color:#fff;font-size:10px;font-weight:700;display:grid;place-items:center;border:2px solid var(--void)}
.chat-panel{position:fixed;right:24px;bottom:96px;width:380px;max-width:calc(100vw - 32px);height:560px;max-height:calc(100vh - 130px);
  background:var(--panel);border:1px solid var(--line-2);border-radius:var(--r-lg);z-index:60;display:none;
  flex-direction:column;overflow:hidden;box-shadow:var(--sh);animation:fade .25s ease}
.chat-panel.open{display:flex}
.chat-top{display:flex;align-items:center;gap:11px;padding:15px 17px;border-bottom:1px solid var(--line);
  background:linear-gradient(120deg,#11201d,var(--panel))}
.chat-top .bot{width:38px;height:38px;border-radius:11px;background:var(--teal);display:grid;place-items:center;flex:none}
.chat-top .bot svg{width:21px;height:21px;color:#04130f}
.chat-top .nm{font-family:var(--f-disp);font-weight:600;font-size:14.5px}
.chat-top .stat{font-size:11px;color:var(--ok);display:flex;align-items:center;gap:5px}
.chat-top .stat::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--ok);box-shadow:0 0 6px var(--ok)}
.chat-top .x{margin-left:auto;width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:var(--muted)}
.chat-top .x:hover{background:var(--panel-2);color:var(--ink)}
.chat-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}

  {id:'KB-01', cat:'PLC / Controller', title:'Siemens S7-1200 goes to STOP mode unexpectedly', views:412, mins:6,
    body:'A CPU dropping to STOP is usually a diagnostic fault. Connect via TIA Portal → Online & Diagnostics → read the diagnostic buffer for the exact event. Common causes: cycle-time watchdog overrun, hardware module fault (check the SF/ERROR LEDs), or a programming error forcing STOP. Verify 24V supply stability and module wiring before re-downloading. Clear the fault, set CPU to RUN, and monitor cycle time.',

    if(c && c.tickets){ State.tickets = c.tickets; }
    else { State.tickets = SEED.tickets(); this.setCache({tickets:State.tickets}); }

    // 2) revalidate from Sheets if configured
    if(CONFIG.API_URL){
      UI.setConn('syncing','Syncing…');
      try{
        const r = await fetch(`${CONFIG.API_URL}?action=list`, {redirect:'follow'});
        const j = await r.json();
        if(j && Array.isArray(j.tickets)){
          State.tickets = j.tickets.map(normalizeTicket);
          this.setCache({tickets:State.tickets});
          UI.setConn('online','Synced · Sheets');
          if(App.current==='tickets'||App.current==='dashboard') App.render();
        }
      }catch(e){ UI.setConn('offline','Offline · cached'); }
    } else {
      UI.setConn('demo','Demo mode');
    }
  },

  async saveTicket(t){
    // optimistic local write
    const i = State.tickets.findIndex(x=>x.id===t.id);
    if(i>=0) State.tickets[i]=t; else State.tickets.unshift(t);
    this.setCache({tickets:State.tickets});
    if(CONFIG.API_URL){
      UI.setConn('syncing','Saving…');
      try{
        await fetch(CONFIG.API_URL, {method:'POST', redirect:'follow',
          headers:{'Content-Type':'text/plain;charset=utf-8'},
          body:JSON.stringify({action:'upsert', ticket:t})});
        UI.setConn('online','Saved · Sheets');
      }catch(e){ UI.setConn('offline','Saved locally'); }
    }
  }
};
function normalizeTicket(t){
  return {...t,
    priority:(t.priority||'medium').toLowerCase(),
    status:(t.status||'open').toLowerCase(),
    thread: typeof t.thread==='string'? safeJSON(t.thread,[]) : (t.thread||[]),
    timeline: typeof t.timeline==='string'? safeJSON(t.timeline,[]) : (t.timeline||[])
  };
}
function safeJSON(s,f){try{return JSON.parse(s)}catch(e){return f}}

/* ================================================================
   ML ENGINE  — client-side, zero-cost intelligence
================================================================ */
const ML = {
  tokenize(s){ return (s||'').toLowerCase().replace(/[^a-z0-9\- ]/g,' ').split(/\s+/).filter(Boolean); },

  // --- Category classification (keyword-weighted scoring) ---
  classify(text){
    const t = ' '+(text||'').toLowerCase()+' ';
    const scores = {};
    for(const [cat,kws] of Object.entries(CATEGORIES)){
      let s=0;
      kws.forEach(k=>{ if(t.includes(k)) s += (k.length>5?2:1.4); });
      scores[cat]=s;
    }
    const ranked = Object.entries(scores).sort((a,b)=>b[1]-a[1]);
    const total = ranked.reduce((a,[,v])=>a+v,0)||1;
    const top = ranked[0];
    return {
      category: top[1]>0 ? top[0] : 'General Support',
      confidence: top[1]>0 ? Math.min(96, Math.round(top[1]/total*100)+38) : 35,
      ranked: ranked.slice(0,3).map(([c,v])=>({cat:c, pct:Math.round(v/total*100)}))
    };
  },

  // --- Priority prediction ---
  priority(text, clientSla){
    const t=' '+(text||'').toLowerCase()+' ';
    let score=40; // baseline = medium
    PRIORITY_SIGNALS.critical.forEach(k=>{ if(t.includes(k)) score+=22; });
    PRIORITY_SIGNALS.high.forEach(k=>{ if(t.includes(k)) score+=11; });
    PRIORITY_SIGNALS.low.forEach(k=>{ if(t.includes(k)) score-=14; });
    if(clientSla==='Critical') score+=14; else if(clientSla==='Priority') score+=7;
    if(/[A-Z]{4,}/.test(text||'')) score+=4;            // shouting
    if((text||'').includes('!')) score+=3;
    score=Math.max(8,Math.min(99,score));
    let level = score>=78?'critical': score>=55?'high': score>=30?'medium':'low';
    return {level, score:Math.round(score)};
  },

  // --- Sentiment (lexicon) ---
  sentiment(text){
    const toks=this.tokenize(text); let s=0;
    const t=' '+(text||'').toLowerCase()+' ';
    NEG_WORDS.forEach(w=>{ if(t.includes(w)) s-=1; });
    POS_WORDS.forEach(w=>{ if(t.includes(w)) s+=1; });
    const label = s<=-2?'Frustrated': s<0?'Concerned': s>0?'Positive':'Neutral';
    const score = Math.max(0,Math.min(100, 50 + s*16));
    return {label, score};
  },

  // --- Resolution time estimate (priority + category history) ---
  resolveEstimate(priority, category){
    const base = CONFIG.SLA_HOURS[priority] || 24;
    const complexity = {'PLC / Controller':1.3,'SCADA / HMI':1.15,'Network / OT':1.25,
      'Instrumentation':1.1,'Drives / Motor':1.2,'Power / Electrical':1.35,
      'Software / Reports':.8,'Process / Tuning':1.4,'Web Apps':.85,'General Support':.9}[category]||1;
    const hrs = Math.max(1, Math.round(base*0.55*complexity));
    return {hours:hrs, sla:base};
  },

  // --- TF-IDF cosine similarity against existing tickets + KB ---
  vectorize(text){
    const toks=this.tokenize(text); const v={};
    toks.forEach(t=>{ if(t.length>2) v[t]=(v[t]||0)+1; });
    return v;
  },
  cosine(a,b){
    let dot=0,na=0,nb=0;
    for(const k in a){ na+=a[k]*a[k]; if(b[k]) dot+=a[k]*b[k]; }
    for(const k in b){ nb+=b[k]*b[k]; }
    return (na&&nb)? dot/Math.sqrt(na*nb) : 0;
  },
  similar(text, limit=3){
    const qv=this.vectorize(text);
    const pool=[
      ...State.tickets.map(t=>({id:t.id, label:t.subject, text:t.subject+' '+(t.body||''), type:'ticket'})),
      ...KB.map(k=>({id:k.id, label:k.title, text:k.title+' '+k.body, type:'kb'}))
    ];
    return pool.map(p=>({...p, score:this.cosine(qv,this.vectorize(p.text))}))
      .filter(p=>p.score>0.04).sort((a,b)=>b.score-a.score).slice(0,limit);
  },

  // Full triage bundle for the live console
  triage(subject, body, clientSla){
    const text=(subject||'')+' '+(body||'');
    const cls=this.classify(text);
    const pri=this.priority(text, clientSla);
    const sent=this.sentiment(text);
    const est=this.resolveEstimate(pri.level, cls.category);
    const sim=this.similar(text,3);
    return {cls,pri,sent,est,sim};
  }
};

function priChip(p){ const m={critical:'CRITICAL',high:'HIGH',medium:'MEDIUM',low:'LOW'};
  return `<span class="chip pri-${p}"><span class="pip"></span>${m[p]||p}</span>`; }
function stChip(s){ const m={open:['st-open','OPEN'],progress:['st-progress','IN PROGRESS'],
  waiting:['st-waiting','AWAITING CLIENT'],resolved:['st-resolved','RESOLVED'],closed:['st-closed','CLOSED']};
  const x=m[s]||['st-open',s.toUpperCase()]; return `<span class="chip ${x[0]}"><span class="pip"></span>${x[1]}</span>`; }
function avatar(id,size){ const a=agentBy(id); const init=a?a.init:'—';
  return `<span class="avatar"${size?` style="width:${size}px;height:${size}px;font-size:${size*.42}px"`:''}>${init}</span>`; }
function ago(ts){ const s=(Date.now()-ts)/1000;
  if(s<60)return'just now'; if(s<3600)return Math.floor(s/60)+'m ago';
  if(s<86400)return Math.floor(s/3600)+'h ago'; return Math.floor(s/86400)+'d ago'; }
function slaInfo(t){
  const target=CONFIG.SLA_HOURS[t.priority]*3600000;
  const elapsed=Date.now()-t.created;
  const pct=Math.min(100,Math.round(elapsed/target*100));
  const done=['resolved','closed'].includes(t.status);
  const color = done?'var(--ok)': pct>=100?'var(--crit)': pct>=75?'var(--high)':'var(--teal)';
  const left = done?'Met':(pct>=100?'BREACHED':`${Math.max(0,Math.round((target-elapsed)/3600000))}h left`);
  return {pct:done?100:pct,color,left,breached:!done&&pct>=100};
}

/* ================================================================

================================================================ */
Object.assign(App, {
  sendReply(){
    const box=document.getElementById('replyBox'); const txt=box.value.trim(); if(!txt)return;
    const t=State.openTicket;
    t.thread.push({by:State.user.name, role:'agent', at:Date.now(), text:txt});
    t.timeline.push({at:Date.now(), text:`Reply from ${State.user.name}`});
    t.updated=Date.now();
    Store.saveTicket(t); this.render(); UI.toast('Reply sent','Added to conversation','ok');
  },
  updateField(field,val){
    const t=State.openTicket; const old=t[field];
    t[field]=val; t.updated=Date.now();
    t.timeline.push({at:Date.now(), text:`${field.charAt(0).toUpperCase()+field.slice(1)} changed: ${old||'—'} → ${val||'—'}`});
    Store.saveTicket(t); this.render(); this.renderSidebar();
    UI.toast('Ticket updated', `${field} → ${val||'unassigned'}`, 'ok');
  },
  saveApi(){
    const url=document.getElementById('apiInput').value.trim();
    localStorage.setItem('nexdesk_api',url); CONFIG.API_URL=url;
    UI.toast(url?'Backend connected':'Demo mode', url?'Syncing with Google Sheets…':'Running locally','ok');
    Store.loadTickets().then(()=>this.render());
  },
  async testApi(){
    const url=document.getElementById('apiInput').value.trim();
    if(!url){UI.toast('No URL','Enter your Apps Script URL first','err');return;}
    UI.toast('Testing…','Reaching Google Sheets','info');
    try{ const r=await fetch(`${url}?action=ping`,{redirect:'follow'}); const j=await r.json();
      UI.toast('Connection OK', j.org||'Backend responding','ok');
    }catch(e){ UI.toast('Connection failed','Check the URL & deployment','err'); }
  }
});

/* ================================================================
   CHARTS  (canvas, no dependencies)
================================================================ */
const Charts = {
  _grid(ctx,w,h,pad){ ctx.strokeStyle='#232C3B';ctx.lineWidth=1;
    for(let i=0;i<=4;i++){const y=pad+(h-2*pad)*i/4;ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(w-pad,y);ctx.stroke();} },
  _setup(id){ const c=document.getElementById(id); if(!c)return null;
    const r=window.devicePixelRatio||1; const rect=c.getBoundingClientRect();
    c.width=rect.width*r; c.height=rect.height*r; const ctx=c.getContext('2d'); ctx.scale(r,r);
    return {ctx,w:rect.width,h:rect.height}; },

  drawTrend(id){ const s=this._setup(id); if(!s)return; const {ctx,w,h}=s; const pad=14;
    const data=[3,5,2,6,4,7,5]; const max=Math.max(...data);
    const grad=ctx.createLinearGradient(0,0,0,h); grad.addColorStop(0,'rgba(45,226,192,.35)');grad.addColorStop(1,'rgba(45,226,192,0)');
    const pts=data.map((v,i)=>[pad+(w-2*pad)*i/(data.length-1), h-pad-(h-2*pad)*v/max]);
    ctx.beginPath();ctx.moveTo(pts[0][0],h-pad);pts.forEach(p=>ctx.lineTo(p[0],p[1]));ctx.lineTo(pts[pts.length-1][0],h-pad);ctx.closePath();ctx.fillStyle=grad;ctx.fill();
    ctx.beginPath();pts.forEach((p,i)=>i?ctx.lineTo(p[0],p[1]):ctx.moveTo(p[0],p[1]));ctx.strokeStyle='#2DE2C0';ctx.lineWidth=2.2;ctx.stroke();
    pts.forEach(p=>{ctx.beginPath();ctx.arc(p[0],p[1],3,0,7);ctx.fillStyle='#2DE2C0';ctx.fill();}); },

  drawVol(){ const s=this._setup('volChart'); if(!s)return; const {ctx,w,h}=s; const pad=24;
    const data=[4,6,3,7,5,8,6,9,5,7,4,8,6,10]; const max=Math.max(...data);
    this._grid(ctx,w,h,pad);
    const bw=(w-2*pad)/data.length*0.55;
    data.forEach((v,i)=>{const x=pad+(w-2*pad)*(i+0.5)/data.length-bw/2; const bh=(h-2*pad)*v/max;
      const g=ctx.createLinearGradient(0,h-pad-bh,0,h-pad);g.addColorStop(0,'#2DE2C0');g.addColorStop(1,'#1c8f7d');
      ctx.fillStyle=g;ctx.beginPath();ctx.roundRect(x,h-pad-bh,bw,bh,3);ctx.fill();}); },

  drawCat(){ const s=this._setup('catChart'); if(!s)return; const {ctx,w,h}=s;
    const byCat={}; State.tickets.forEach(t=>byCat[t.category]=(byCat[t.category]||0)+1);
    const entries=Object.entries(byCat); const total=entries.reduce((a,[,v])=>a+v,0);
    const cols=['#2DE2C0','#3DB9F5','#FF9F40','#FFD23F','#FF4D5E','#36D399','#5B8CFF','#a78bfa'];
    const cx=w/2,cy=h/2,rO=Math.min(w,h)/2-12,rI=rO*0.6; let a=-Math.PI/2;
    entries.forEach(([,v],i)=>{const ang=v/total*Math.PI*2;
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,rO,a,a+ang);ctx.closePath();ctx.fillStyle=cols[i%cols.length];ctx.fill();a+=ang;});
    ctx.beginPath();ctx.arc(cx,cy,rI,0,7);ctx.fillStyle='#131822';ctx.fill();
    ctx.fillStyle='#E6ECF5';ctx.font='700 22px Chakra Petch';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(total,cx,cy-6);
    ctx.fillStyle='#8B97AB';ctx.font='500 10px JetBrains Mono';ctx.fillText('TICKETS',cx,cy+12);
    const leg=document.getElementById('catLegend');
    if(leg) leg.innerHTML=entries.map(([c,v],i)=>`<span><i style="background:${cols[i%cols.length]}"></i>${c} (${v})</span>`).join(''); },

  drawRes(){ const s=this._setup('resChart'); if(!s)return; const {ctx,w,h}=s; const pad=30;
    const labels=['Critical','High','Medium','Low']; const data=[3.2,8.5,16,42]; const max=Math.max(...data);
    const cols=['#FF4D5E','#FF9F40','#FFD23F','#3DB9F5'];
    this._grid(ctx,w,h,pad);
    const bw=(w-2*pad)/labels.length*0.5;
    data.forEach((v,i)=>{const x=pad+(w-2*pad)*(i+0.5)/labels.length-bw/2; const bh=(h-2*pad)*v/max;
      ctx.fillStyle=cols[i];ctx.beginPath();ctx.roundRect(x,h-pad-bh,bw,bh,4);ctx.fill();
      ctx.fillStyle='#8B97AB';ctx.font='500 11px JetBrains Mono';ctx.textAlign='center';
      ctx.fillText(labels[i],x+bw/2,h-pad+15); ctx.fillStyle='#E6ECF5';ctx.fillText(v+'h',x+bw/2,h-pad-bh-7);}); },

  drawAll(){ this.drawVol(); this.drawCat(); this.drawRes(); }
};

/* ================================================================
   AI CHATBOT  — KB-retrieval, zero-cost, offline-capable
================================================================ */
const Chat = {
  history:[], open:false,
  mount(){
    document.getElementById('chatPanel').innerHTML=`
      <div class="chat-top"><div class="bot">${svg(ICON.bot)}</div>
        <div><div class="nm">NEX Assistant</div><div class="stat">Online · trained on your KB</div></div>
        <button class="x" onclick="Chat.toggle()">${svg(ICON.x)}</button></div>
      <div class="chat-body" id="chatBody"></div>
      <div class="quick" id="chatQuick"></div>
      <div class="chat-input"><input id="chatInput" placeholder="Ask about an issue…" onkeydown="if(event.key==='Enter')Chat.send()">
        <button onclick="Chat.send()">${svg(ICON.send)}</button></div>`;
    this.history=[{role:'bot', text:`Hi! I'm the NEXDESK assistant. I can help diagnose PLC, SCADA, network, drive, instrumentation and web-app issues from our knowledge base — or help you log a ticket. What's happening?`}];
    this.renderHistory(); this.renderQuick(['Siemens PLC in STOP','PROFINET dropping','Web app shows blank screen','How do I create a ticket?']);
  },
  toggle(){ this.open=!this.open; document.getElementById('chatPanel').classList.toggle('open',this.open);
    document.getElementById('chatPing').style.display='none';
    if(this.open) setTimeout(()=>document.getElementById('chatInput')?.focus(),100); },
  renderHistory(){ const b=document.getElementById('chatBody');
    b.innerHTML=this.history.map(m=>`<div class="cmsg ${m.role==='me'?'me':'bot'}">
      <div class="ic">${svg(m.role==='me'?ICON.user:ICON.bot)}</div><div class="cb">${m.text}</div></div>`).join('');
    b.scrollTop=b.scrollHeight; },
  renderQuick(arr){ document.getElementById('chatQuick').innerHTML=arr.map(q=>`<button onclick="Chat.send('${q.replace(/'/g,"\\'")}')">${q}</button>`).join(''); },
  send(text){ const inp=document.getElementById('chatInput'); const msg=text||inp.value.trim(); if(!msg)return;
    inp.value=''; this.history.push({role:'me',text:msg}); this.renderHistory(); this.renderQuick([]);
    // typing indicator
    const b=document.getElementById('chatBody');
    b.insertAdjacentHTML('beforeend',`<div class="cmsg bot" id="typing"><div class="ic">${svg(ICON.bot)}</div><div class="cb"><div class="typing"><i></i><i></i><i></i></div></div></div>`);
    b.scrollTop=b.scrollHeight;
    setTimeout(()=>{document.getElementById('typing')?.remove();
      const reply=this.answer(msg); this.history.push({role:'bot',text:reply.text}); this.renderHistory();
      this.renderQuick(reply.quick||[]);},650+Math.random()*400);
  },
  answer(q){
    const ql=q.toLowerCase();
    if(/create|log|new ticket|raise|open a ticket/.test(ql))
      return {text:`To log a ticket, tap <b>New ticket</b> (top right). As you type, the AI triage panel will auto-classify the category, predict priority, and surface related cases. Want me to open it for you?`,
        quick:['Open new ticket','Show me the queue']};
    if(/open new ticket/.test(ql)){ setTimeout(()=>{Chat.toggle();App.openNewTicket();},300); return {text:`Opening the new ticket form…`}; }
    if(/queue|show.*ticket|my tickets/.test(ql)){ setTimeout(()=>{Chat.toggle();App.go('tickets');},300); return {text:`Taking you to the ticket queue.`}; }
    // KB retrieval via similarity
    const hits=ML.similar(q,2).filter(h=>h.type==='kb');
    if(hits.length){
      const k=KB.find(x=>x.id===hits[0].id);
      const snippet=k.body.split('. ').slice(0,2).join('. ')+'.';
      return {text:`Based on our knowledge base — <b>${k.title}</b>:<br><br>${snippet}<br><br><a onclick="Chat.toggle();Modals.kbArticle('${k.id}')">Read the full article →</a>`,
        quick:hits.slice(1).map(h=>KB.find(x=>x.id===h.id)?.title).filter(Boolean).concat(['Log this as a ticket'])};
    }
    // category guess fallback
    const cls=ML.classify(q);
    if(cls.confidence>45)
      return {text:`That sounds like a <b>${cls.category}</b> issue. I don't have an exact article, but I can route this to the right specialist. Would you like to log it as a ticket so an engineer can pick it up?`,
        quick:['Open new ticket','Browse knowledge base']};
    return {text:`I can help with PLC, SCADA, network, drive, instrumentation, power and web-app issues, or help you log a ticket. Could you describe the symptom and the equipment or app involved?`,
      quick:['Siemens PLC in STOP','PROFINET dropping','Web app shows blank screen','Browse knowledge base']};
  }
};

window.addEventListener('resize', ()=>{ if(App.current==='analytics')Charts.drawAll(); if(App.current==='dashboard')Charts.drawTrend('miniTrend'); });
